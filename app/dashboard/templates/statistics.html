{% extends "base.html" %}

{% block title %}Statistics - TGIndex{% endblock %}

{% block content %}
<div class="space-y-6">
    <h1 class="text-3xl font-bold">Statistics</h1>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h3 class="text-gray-400 text-sm">Total Indexed</h3>
            <p class="text-3xl font-bold text-blue-400">{{ stats.total_chats }}</p>
        </div>
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h3 class="text-gray-400 text-sm">Queue Pending</h3>
            <p class="text-3xl font-bold text-orange-400">{{ stats.queue_size }}</p>
        </div>
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h3 class="text-gray-400 text-sm">Total Processed</h3>
            <p class="text-3xl font-bold text-green-400">{{ stats.processed_urls }}</p>
        </div>
    </div>

    <!-- Growth Chart -->
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <h2 class="text-xl font-bold mb-4">Growth Over Time</h2>
        <canvas id="growthChart" height="300"></canvas>
    </div>

    <script>
        const ctx = document.getElementById('growthChart').getContext('2d');
        const history = {{ history | tojson }};

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: history.map(h => h.date),
                datasets: [{
                    label: 'Total Chats',
                    data: history.map(h => h.total_chats),
                    borderColor: 'rgb(59, 130, 246)',
                    tension: 0.1
                }, {
                    label: 'New Today',
                    data: history.map(h => h.new_today),
                    borderColor: 'rgb(34, 197, 94)',
                    tension: 0.1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: 'rgb(156, 163, 175)' }
                    },
                    x: {
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        ticks: { color: 'rgb(156, 163, 175)' }
                    }
                },
                plugins: {
                    legend: { labels: { color: 'rgb(156, 163, 175)' } }
                }
            }
        });
    </script>
</div>
{% endblock %}
